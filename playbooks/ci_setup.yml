---
- hosts: localhost
  become: true
  any_errors_fatal: true

  pre_tasks:
    - name: include cloudhost vars
      include_vars:
        file: group_vars/cloudhost.yml

    - name: include ci vars
      include_vars:
        file: ../spec/vars.yml

    # Same os_vars pickup as playbooks/base.yml. Loaded after spec/vars.yml so
    # distro defaults (e.g. iw_php_ver, iw_mysql_ver) win over CI overrides.
    - name: include OS-specific vars
      include_vars:
        dir: "{{ playbook_dir }}/os_vars"
        files_matching: "{{ ansible_distribution }}-{{ ansible_distribution_major_version }}.yml"

    - name: ensure /etc/sysconfig/network file
      file:
        path: /etc/sysconfig/network
        state: touch
      changed_when: false

    # this pulls in a "newer" djbdns rpm that has a higher DATALIMIT set
    # else for some kernel versions you'll get this in dnscache logs:
    #   dnscache: fatal: not enough memory for cache of size
    # and something like this in syslog:
    #   Feb 27 17:19:04 49cf0a03a2f7 kernel: mmap: dnscache (7539): VmData 3002368 exceed data ulimit 3000000. Update limits or use boot option ignore_rlimit_data.
    - name: Add djbdns repo
      ansible.builtin.yum_repository:
        name: iworx-djbdns
        description: iworx djbdns test repo
        baseurl: "http://updates.interworx.com/_internal/builds/00-rpm-build/794/RPMS/7/x86_64/"
      when: ansible_distribution_major_version == '7'

    - include: tasks/cloudhost.yml mode="pre"

  roles:
    - role: nexcess.php
      vars:
        php_prefix: "php56"
      when: ansible_distribution_major_version == '7'
    - role: nexcess.php
      vars:
        php_prefix: "php70"
      when: ansible_distribution_major_version == '7'
    - role: nexcess.php
      vars:
        php_prefix: "php71"
      when: ansible_distribution_major_version == '7'
    # nexcess.mariadb must run before nexcess.interworx so MariaDB is
    # already set up (service installed + running) when the iworx install
    # script tries to talk to it. The production setup.yml uses the same
    # order; ci_setup.yml had them swapped, which on EL9 caused the iworx
    # installer to fail with a mysqld.service symlink conflict and an
    # unreachable mysql socket.
    - nexcess.mariadb
    - nexcess.interworx
  post_tasks:
    - include: tasks/cloudhost.yml mode="post"
    # iworx 8 defaults to mod_suphp; the spec tests expect php-fpm (matching
    # the EL7 build's baseline). Switch the install mode explicitly.
    - name: Switch iworx PHP install mode to php-fpm
      command: nodeworx -unv -c Http -a setPhpInstallMode --install_mode=fpm
    # Production uses Puppet to register the installed PHP versions with
    # InterWorx. CI doesn't run Puppet, so do it here for both EL7 (multi-
    # PHP php56/70/71) and EL9 (single iw_php_ver, e.g. /opt/remi/php81
    # installed by the nexcess.interworx role).
    - include: tasks/iworx-php-scl.yml
      vars:
        php_remi_root: "/opt/remi"
